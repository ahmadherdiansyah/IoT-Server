services:
  app:
    build: .
    ports:
      - "3000:8080"
    environment:
      # Internal services — override .env values for container networking
      MONGO_URI: mongodb://mongo:27017/mqtt
      MQTT_HOST: emqx
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: 8080
    depends_on:
      mongo:
        condition: service_healthy
      emqx:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7-jammy
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  emqx:
    image: emqx/emqx:5.8
    ports:
      - "1883:1883"    # MQTT
      - "18083:18083"  # Dashboard (admin: admin / public)
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mongo_data:
  emqx_data:
