services:
  app:
    build: .
    ports:
      - "3000:8080"
    environment:
      # Internal MongoDB — overrides .env MONGO_URI for container networking
      MONGO_URI: mongodb://mongo:27017/mqtt
      # Read from .env file on the host
      SESSION_SECRET: ${SESSION_SECRET}
      MQTT_HOST: ${MQTT_HOST}
      PORT: 8080
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7-jammy
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
